version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bible_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bible_user
      POSTGRES_PASSWORD: bible_password_123
      POSTGRES_DB: bible_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema do drizzle-kit migrate quản lý; seed data qua `npm run db:seed`.
      # Dựng DB đầy đủ 1 lệnh: `npm run db:reset`.

volumes:
  postgres_data:
