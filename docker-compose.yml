version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bible_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bible_user
      POSTGRES_PASSWORD: bible_password_123
      POSTGRES_DB: bible_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-seed khi volume RỖNG (máy mới): postgres chạy các file *.sql theo thứ tự tên.
      # sql/001..006 -> schema + seed + data + votd. Lần sau (volume đã có data) sẽ bỏ qua.
      - ./sql:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
