version: 2
updates:
  # Cập nhật npm dependencies hàng tuần, gom nhóm cho đỡ nhiễu PR
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nestjs:
        patterns: ['@nestjs/*']
      opentelemetry:
        patterns: ['@opentelemetry/*']
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
  # Cập nhật cả version của GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
