# fly.toml app configuration file generated for bible-api-ibsnxg on 2026-04-11T10:08:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bible-api-ibsnxg'
primary_region = 'iad'

# Swap: RSS spike (đỉnh ~183MB đo được) không bị OOM-kill trên VM 256MB.
# Đổi chút latency (disk) lấy an toàn — hợp API traffic thấp.
swap_size_mb = 512

[build]

[env]
  # Ép V8 GC sớm, giữ heap gọn cho container nhỏ.
  NODE_OPTIONS = '--max-old-space-size=200'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # Health check /health → Fly TỰ rollback nếu máy mới không healthy khi deploy.
  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
