# fly.toml app configuration file generated for bible-api-ibsnxg on 2026-04-11T10:08:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bible-api-ibsnxg'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  # Health check /health → Fly TỰ rollback nếu máy mới không healthy khi deploy.
  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
